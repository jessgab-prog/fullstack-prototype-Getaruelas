<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- Viewport Meta Tag ni-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Full-Stack App (Student Build)</title>

    <!-- Bootstrap 5 CSS CDN  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- nav bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="#">
      Full-Stack App
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav" id="authSection">
        <!-- JS controls this -->
      </ul>
    </div>

  </div>
</nav>

    <!-- Home Section -->
<div class="container mt-5" id="mainContent">
    <!-- JS will replace this content -->
</div>

<!-- Profile Section -->
<div id="profileSection" class="mt-5 d-none">

  <h4 class="fw-bold mb-3">My Profile</h4>

  <div class="card shadow-sm">
    <div class="card-body">

      <h5 id="profileName" class="fw-bold"></h5>
      <p class="mb-1">
        <strong>Email:</strong> <span id="profileEmail"></span>
      </p>
      <p>
        <strong>Role:</strong> <span id="profileRole"></span>
      </p>

      <button class="btn btn-outline-primary btn-sm"
              onclick="editProfile()">
        Edit Profile
      </button>

    </div>
  </div>

</div>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
